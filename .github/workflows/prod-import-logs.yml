# One-shot: dump recent import/parse logs from prod via deploy SSH.
# Actions → Prod import logs → Run workflow
name: Prod import logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch parser import logs
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH=(ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=25 -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}")
          "${SSH[@]}" "cd '${DEPLOY_PATH}' && (
            echo '=== compose ps ==='
            docker compose -f docker-compose.prod.yml ps
            echo '=== import_plans ==='
            docker compose -f docker-compose.prod.yml exec -T postgres \
              psql -U avtovozom -d avtovozom -c \
              \"SELECT id, status, stop_requested, left(coalesce(banner,''),120) AS banner, left(coalesce(error,''),120) AS err, updated_at FROM import_plans;\"
            echo '=== import_plan_items ==='
            docker compose -f docker-compose.prod.yml exec -T postgres \
              psql -U avtovozom -d avtovozom -c \
              \"SELECT id, sort_order, status, attempts, parse_job_id, model_id, left(coalesce(message,''),100) AS msg, left(url,60) AS url FROM import_plan_items ORDER BY sort_order, id LIMIT 30;\"
            echo '=== recent parse_jobs ==='
            docker compose -f docker-compose.prod.yml exec -T postgres \
              psql -U avtovozom -d avtovozom -c \
              \"SELECT id, type, status, total_errors, left(coalesce(message,''), 240) AS msg, started_at, finished_at FROM parse_jobs ORDER BY id DESC LIMIT 20;\"
            echo '=== parser logs (tail) ==='
            docker compose -f docker-compose.prod.yml logs --tail=250 parser 2>&1 | tail -200
            echo '=== backend import plan errors ==='
            docker compose -f docker-compose.prod.yml logs --tail=400 backend 2>&1 | grep -iE 'import.plan|import_plan|parse_job|import_one|error|traceback|exception|failed' | tail -80
          )"

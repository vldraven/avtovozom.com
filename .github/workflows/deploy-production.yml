# Деплой в прод по пушу в main или вручную (Actions → Run workflow).
# Секреты репозитория: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY
# См. deploy/GITHUB_AND_DOMAIN.md

name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rsync and docker compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST:-}" && test -n "${DEPLOY_USER:-}" && test -n "${DEPLOY_PATH:-}" && test -n "${SSH_KEY:-}" || {
            echo "Missing secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY"
            exit 1
          }
          mkdir -p ~/.ssh
          # Многострочный ключ + финальный перевод строки; убираем CR после копирования с Windows
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! grep -qE 'BEGIN (OPENSSH|EC|RSA) PRIVATE KEY' ~/.ssh/deploy_key; then
            echo "::error::DEPLOY_SSH_KEY должен быть ПРИВАТНЫМ ключом (строки BEGIN … PRIVATE KEY). Не вставляйте .pub"
            exit 1
          fi
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Проверка SSH (BatchMode)…"
          if ! ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "echo ssh_ok"; then
            echo "::error::SSH не удалось: проверьте DEPLOY_SSH_KEY (приватный ключ), DEPLOY_HOST, DEPLOY_USER и что публичный ключ есть в ~/.ssh/authorized_keys на сервере для этого пользователя."
            exit 255
          fi
          RSYNC_RSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          rsync -avz -e "$RSYNC_RSH" \
            --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'web/.next/' \
            --exclude 'web/node_modules/' \
            --exclude '__pycache__/' \
            --exclude '.env' \
            --exclude 'media/' \
            --exclude '.cursor/' \
            --exclude '.DS_Store' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && docker compose -f docker-compose.prod.yml up -d --build && docker compose -f docker-compose.prod.yml ps"

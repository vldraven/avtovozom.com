<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>avtovozom offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #f1f5f9;
      }
      main {
        max-width: 420px;
        padding: 24px;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.14);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #475569;
      }
      button {
        margin-top: 18px;
        border: none;
        border-radius: 10px;
        padding: 11px 16px;
        color: #fff;
        background: #0ea5e9;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет подключения</h1>
      <p>Проверьте интернет и попробуйте открыть avtovozom еще раз.</p>
      <button type="button" onclick="location.reload()">Повторить</button>
    </main>
  </body>
</html>
